<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CYBER SYSTEM v7</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff88;
    font-family: monospace;
}

/* scan lines */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,255,136,0.05),
        rgba(0,255,136,0.05) 1px,
        transparent 2px,
        transparent 4px
    );
    pointer-events: none;
}

/* ALL SCREENS */
.screen {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* ACTIVE SCREEN */
.active {
    display: flex;
}

/* LOGIN */
.glow {
    width: 130px;
    filter: drop-shadow(0 0 15px #00ff88);
}

/* INPUT */
input, button {
    margin: 6px;
    padding: 10px;
    background: black;
    color: #00ff88;
    border: 1px solid #00ff88;
    border-radius: 5px;
}

button:hover {
    background: #00ff88;
    color: black;
}

/* SHAKE */
@keyframes shake {
    0%{transform:translate(0)}
    25%{transform:translate(-5px)}
    50%{transform:translate(5px)}
    75%{transform:translate(-5px)}
    100%{transform:translate(0)}
}
.shake { animation: shake 0.3s; }

/* RESULT */
#result {
    white-space: pre-line;
    margin-top: 10px;
    text-align: center;
}

/* MAP */
#map {
    width: 90%;
    height: 300px;
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot" class="screen active">
    <h2>BOOTING SYSTEM...</h2>
    <div id="bar">0%</div>
</div>

<!-- LOGIN -->
<div id="login" class="screen">
    <img class="glow"
    src="data:image/svg+xml;utf8,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300ff88'>
    <path d='M12 2c2.2 0 4 1.8 4 4h2c0-3.3-2.7-6-6-6S6 2.7 6 6h2c0-2.2 1.8-4 4-4zm6 6H6L4 20h16l-2-12zm-6 10c-2.2 0-4-1.8-4-4h2c0 1.1.9 2 2 2s2-.9 2-2h2c0 2.2-1.8 4-4 4z'/>
    </svg>">

    <h2>ACCESS SYSTEM</h2>

    <input type="password" id="pass" placeholder="PASSWORD">
    <button onclick="login()">ENTER</button>

    <div id="msg"></div>
</div>

<!-- APP -->
<div id="app" class="screen">
    <h2>CYBER IP TOOL v7</h2>

    <input id="ip" placeholder="ENTER IP">
    <button onclick="scan()">SCAN</button>
    <button onclick="myIP()">MY IP</button>
    <button onclick="showHistory()">HISTORY</button>

    <div id="result"></div>

    <iframe id="map"></iframe>
</div>

<!-- HISTORY -->
<div id="history" class="screen">
    <h3>HISTORY</h3>
    <div id="list"></div>
    <button onclick="back()">BACK</button>
</div>

<!-- POPUP -->
<div id="popup" class="screen">
    <div id="popupText"></div>
    <button onclick="closePopup()">CLOSE</button>
</div>

<script>

const PASSWORD = "1234";
let coords = "";

/* ---------------- BOOT ---------------- */
let p = 0;
let boot = setInterval(() => {
    p++;
    document.getElementById("bar").innerText = p + "%";

    if (p >= 100) {
        clearInterval(boot);
        switchScreen("boot", "login");
    }
}, 20);

/* ---------------- SCREEN SWITCH ---------------- */
function switchScreen(from, to) {
    document.getElementById(from).classList.remove("active");
    document.getElementById(to).classList.add("active");
}

/* ---------------- LOGIN ---------------- */
function login() {
    let p = document.getElementById("pass").value.trim();

    if (p === PASSWORD) {
        document.getElementById("msg").innerText = "ACCESS GRANTED";

        setTimeout(() => {
            switchScreen("login", "app");
        }, 700);

    } else {
        document.getElementById("msg").innerText = "ACCESS DENIED";
        document.getElementById("login").classList.add("shake");

        setTimeout(() => {
            document.getElementById("login").classList.remove("shake");
        }, 300);
    }
}

/* ---------------- IP SCAN ---------------- */
async function scan() {
    let ip = document.getElementById("ip").value.trim();
    if (!ip) return;

    let r = await fetch("http://ip-api.com/json/" + ip);
    let d = await r.json();

    coords = d.lat + "," + d.lon;

    document.getElementById("result").innerText =
        "IP: " + ip + "\nCITY: " + d.city + "\nCOUNTRY: " + d.country;

    document.getElementById("map").src =
        "https://maps.google.com/maps?q=" + coords + "&z=10&output=embed";

    save(ip, d);
}

/* ---------------- MY IP ---------------- */
async function myIP() {
    let ip = await fetch("https://api.ipify.org").then(r => r.text());
    document.getElementById("ip").value = ip;
    scan();
}

/* ---------------- DB ---------------- */
function save(ip, d) {
    let db = JSON.parse(localStorage.getItem("db") || "{}");
    db[ip] = d;
    localStorage.setItem("db", JSON.stringify(db));
}

/* ---------------- HISTORY ---------------- */
function showHistory() {
    switchScreen("app", "history");

    let db = JSON.parse(localStorage.getItem("db") || "{}");
    let html = "";

    for (let ip in db) {
        html += `<div onclick="openIP('${ip}')">${ip} - ${db[ip].city}</div>`;
    }

    document.getElementById("list").innerHTML = html;
}

function openIP(ip) {
    let db = JSON.parse(localStorage.getItem("db"));
    let d = db[ip];

    document.getElementById("popupText").innerText =
        ip + "\n" + d.city + "\n" + d.country;

    switchScreen("history", "popup");
}

function closePopup() {
    switchScreen("popup", "history");
}

/* ---------------- BACK ---------------- */
function back() {
    switchScreen("history", "app");
}

</script>

</body>
</html>
